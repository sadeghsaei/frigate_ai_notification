blueprint:
  name: Frigate Notifications (0.14.0.2y - GenAI Enhanced)
  author: SgtBatten
  homeassistant:
    min_version: 2024.11.0
  description: |
    ## Frigate Notifications Enhanced

    A modified blueprint layout built to support standard Frigate events alongside GenAI tracking object description notifications.

  domain: automation
  source_url: https://github.com/SgtBatten/HA_blueprints/blob/main/Frigate_Camera_Notifications/Beta.yaml
  input:
    camera:
      name: Frigate Cameras
      description: |
        Select the cameras that will trigger notifications.
      selector:
        entity:
          filter:
            integration: frigate
            domain: camera
          multiple: true
    notify_device:
      name: Mobile Device
      description: Select a mobile app device destination.
      default: false
      selector:
        device:
          filter:
            integration: mobile_app
    notify_group:
      name: Notification Group (Optional)
      default: ""
    base_url:
      name: Base URL (Optional)
      default: ""
    mqtt_topic:
      name: MQTT Topic (Advanced)
      default: frigate/reviews
    client_id:
      name: Client ID (Optional)
      default: ""
    telegram_base_url:
      name: Telegram Base URL (Optional)
      default: ""
    notify_telegram_chat_id:
      name: Telegram Chat ID (Optional)
      default: ""
    title:
      name: Notification Title (Optional)
      default: ""
    message:
      name: Notification Message
      default: "A {{ label }} was detected on the {{ camera_name }} camera."
    update_sub_label:
      name: Update Sub Labels (Advanced)
      default: true
      selector:
        boolean:
    subtitle:
      name: Subtitle
      default: ""
    critical:
      name: Critical Notification (Optional)
      default: "false"
    tts:
      name: Use TTS
      default: false
      selector:
        boolean:
    tts_helper:
      name: TTS Text Helper Entity
      default: ""
      selector:
        entity:
          filter:
            integration: input_text
    alert_once:
      name: Alert Once
      default: false
      selector:
        boolean:
    attachment:
      name: Initial Attachment
      default: "{{base_url}}/api/frigate{{client_id}}/notifications/{{id}}/thumbnail.jpg"
    attachment_2:
      name: Subsequent Attachment
      default: "{{base_url}}/api/frigate{{client_id}}/notifications/{{id}}/thumbnail.jpg"
    video:
      name: Video Link Clip
      default: ""
    final_update:
      name: Final update
      default: false
      selector:
        boolean:
    color:
      name: Notification Color
      default: "#03a9f4"
    icon:
      name: Notification Icon
      default: mdi:homeassistant
    group:
      name: Notification Threading Group
      default: "{{camera}}-frigate-notification"
    sound:
      name: Sound File
      default: default
    volume:
      name: Volume
      default: 100
      selector:
        number:
          max: 100
          min: 0
          mode: slider
    ios_live_view:
      name: Live View Entity
      default: ""
      selector:
        entity:
          filter:
            domain: camera
    android_auto:
      name: Android Auto toggle
      default: false
      selector:
        boolean:
    sticky:
      name: Sticky Toggle
      default: false
      selector:
        boolean:
    channel:
      name: Audio Notification Channel
      default: ""
    review_severity:
      name: Event Type Severity Filters
      default:
        - alert
        - detection
      selector:
        select:
          options:
            - label: Alerts
              value: alert
            - label: Detections
              value: detection
          multiple: true
    master_condition:
      name: Master Condition Drop Switch
      default: []
      selector:
        condition: {}
    zone_filter:
      name: Zone Filter Toggle
      default: false
      selector:
        boolean:
    zones:
      name: Required Detection Zones
      default: []
      selector:
        select:
          options:
            - porch
            - front_door
            - side
            - garden
          multiple: true
          custom_value: true
    zone_multi:
      name: Multi-Zone Toggle
      default: false
      selector:
        boolean:
    zone_order_enforced:
      name: Zone Order Toggle
      default: false
      selector:
        boolean:
    labels:
      name: Object Match Filters
      default: ""
    presence_filter:
      name: Presence Checking Filter
      default: ""
    state_filter:
      name: State Domain Filter Toggle
      default: false
      selector:
        boolean:
    state_entity:
      name: State Track Entity
      default: ""
      selector:
        entity: {}
    state_filter_states:
      name: Allowable State Filter Criteria
      default: []
    disable_times:
      name: Time Restriction Exclusions
      default: []
    custom_filter:
      name: Custom Boolean Filter
      default: true
    cooldown:
      name: Cooldown Interval Timer
      default: 0
    timeout:
      name: Loop Automation Max Lifecycle Timeout
      default: 2
    silence_timer:
      name: Actions Silence Duration
      default: 30
    loiter_timer:
      name: Loitering Static Timer
      default: 0
    initial_delay:
      name: Initial Wait Buffering Time
      default: 0
    final_delay:
      name: Post Event Wrap Delay Timer
      default: 5
    custom_action_manual:
      name: Custom Manual Button Triggers Actions List
      default: []
      selector:
        action: {}
    custom_action_auto:
      name: Automated Launch Actions List
      default: []
      selector:
        action: {}
    custom_action_auto_multi:
      name: Automated Loop Update Executions List
      default: []
      selector:
        action: {}
    tv:
      name: TV Target Notification Overlay Toggle
      default: false
      selector:
        boolean:
    tv_position:
      name: TV Output Matrix Layout Position
      default: center
    tv_size:
      name: TV Frame Element Sizing Profile
      default: large
    tv_duration:
      name: TV Message Persistence Length
      default: 10
    tv_transparency:
      name: TV Alpha Element Opacity Percentage Layout
      default: 0%
    tv_interrupt:
      name: TV Application Interrupt Control Check
      default: false
      selector:
        boolean:
    debug:
      name: System Debug Diagnostics Logger Logging
      default: false
      selector:
        boolean:
    redacted:
      name: Scrub External URL Signatures
      default: true
      selector:
        boolean:

mode: parallel

trigger_variables:
  mqtt_topic: !input mqtt_topic

triggers:
  - trigger: mqtt
    topic: "{{mqtt_topic}}"
    payload: "new"
    value_template: "{{value_json['type']}}"
    id: frigate-event
  - trigger: mqtt
    topic: "{{mqtt_topic}}"
    payload: genai
    value_template: "{{value_json['type']}}"
    id: genai-event
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "silence-{{ this.entity_id }}"
    id: silence
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "custom-{{ this.entity_id }}"
    id: custom
  - trigger: mqtt
    topic: "frigate/tracked_object_update"
    id: frigate-ai-update

variables:
  input_camera: !input camera
  input_camera_name: "{{input_camera|expand|map(attribute='attributes.camera_name', default='none')|list}}"
  camera: >
    {% if trigger.id == 'frigate-event' %}
      {{ trigger.payload_json['after']['camera'] }}
    {% elif trigger.id == 'frigate-ai-update' %}
      {{ trigger.payload_json['camera'] }}
    {% else %}
      none
    {% endif %}
  camera_name: "{{ camera | replace('_', ' ') | title }}"
  input_severity: !input review_severity
  severity: "{{trigger.payload_json['after']['severity'] if trigger.id in ['frigate-event', 'genai-event'] else 'info'}}"
  type: "{{trigger.payload_json['type'] if trigger.id in ['frigate-event', 'genai-event'] else 'none'}}"
  input_base_url: !input base_url
  base_url: "{{ input_base_url.rstrip('/')}}"
  input_telegram_base_url: !input telegram_base_url
  telegram_base_url: "{{ input_telegram_base_url.rstrip('/') if input_telegram_base_url else base_url }}"
  update_sub_label: !input update_sub_label
  input_client_id: !input client_id
  client_id: "{{input_client_id if not input_client_id else '/' + input_client_id if '/' not in input_client_id else input_client_id }}"
  alert_once: !input alert_once
  final_update: !input final_update
  ios_live_view: !input ios_live_view
  android_auto: !input android_auto
  notify_group: !input notify_group
  notify_group_target: "{{ notify_group | lower | regex_replace('^notify\\.', '') | replace(' ','_') }}"
  telegram_chat_id: !input notify_telegram_chat_id
  telegram: "{{true if (telegram_chat_id | length > 0) else false}}"
  zone_only: !input zone_filter
  input_zones: !input zones
  zones: "{{ input_zones }}"
  zone_multi: !input zone_multi
  zone_order_enforced: !input zone_order_enforced
  input_labels: !input labels
  labels: "{{ input_labels | list | lower }}"
  presence_entity: !input presence_filter
  disable_times: !input disable_times
  cooldown: !input cooldown
  timeout: !input timeout
  loitering: false
  loiter_timer: !input loiter_timer
  initial_delay: !input initial_delay
  final_delay: !input final_delay
  fps: "{{ states('sensor.' + camera + '_camera_fps')|int(5) if camera != 'none' else 5 }}"
  state_only: !input state_filter
  input_entity: !input state_entity
  input_states: !input state_filter_states
  states_filter: "{{ input_states | list | lower }}"
  custom_filter: !input custom_filter
  color: !input color
  sound: !input sound
  input_volume: !input volume
  volume: "{{ (1 * input_volume|int(100))/100 }}"
  sticky: !input sticky
  tv: !input tv
  tv_position: !input tv_position
  tv_size: !input tv_size
  tv_duration: !input tv_duration
  tv_transparency: !input tv_transparency
  tv_interrupt: !input tv_interrupt
  debug: !input debug
  redacted: !input redacted
  master_condition: !input master_condition
  severity_satisfied: "{{input_severity|select('in', severity)|list|length > 0 if trigger.id in ['frigate-event', 'genai-event'] else true}}"
  objects: "{{ trigger.payload_json['after']['data']['objects'] if trigger.id in ['frigate-event', 'genai-event'] else [] }}"
  objects_satisfied: "{{ not labels|length or labels|select('in', objects)|list|length > 0 or objects|map('regex_replace', '-verified$', '')|select('in', labels)|list|length > 0 }}"
  initial_home: "{{ presence_entity != '' and presence_entity|expand|selectattr('state','eq','home')|list|length != 0 }}"
  state_satisfied: "{{ not state_only or states(input_entity)|lower in states_filter }}"
  before_zones: "{{ trigger.payload_json['before']['data']['zones'] if trigger.id in ['frigate-event', 'genai-event'] else [] }}"
  after_zones: "{{ trigger.payload_json['after']['data']['zones'] if trigger.id in ['frigate-event', 'genai-event'] else [] }}"
  zone_multi_filter: "{{zone_only and zone_multi and after_zones|length and zones and zones |reject('in', after_zones) |list |length == 0 }}"
  filters_satisfied: "{{ severity_satisfied and objects_satisfied and not initial_home and state_satisfied and custom_filter }}"

conditions:
  condition: or
  conditions:
    - condition: trigger
      id: silence
    - condition: trigger
      id: custom
    - condition: and
      conditions:
        - condition: trigger
          id:
            - frigate-event
            - genai-event
            - frigate-ai-update
        - alias: Camera Match
          condition: template
          value_template: "{{ camera == 'none' or input_camera_name | select('equalto', camera) | list | length > 0 }}"
        - alias: Master Condition
          condition: !input master_condition
        - alias: Cooldown
          condition: template
          value_template: >
            {{ trigger.id in ['genai-event', 'frigate-ai-update'] or
               not this.attributes.last_triggered or
               (now() - this.attributes.last_triggered).seconds > cooldown }}
        - alias: Disable Times
          condition: template
          value_template: "{{ not disable_times|length or not now().hour in disable_times|map('int')|list }}"

actions:
  - choose:
      - alias: "Silence New Object Notifications"
        conditions:
          - condition: trigger
            id: silence
        sequence:
          - action: automation.turn_off
            target:
              entity_id: "{{ this.entity_id }}"
            data:
              stop_actions: false
          - delay:
              minutes: !input silence_timer
          - action: automation.turn_on
            target:
              entity_id: "{{ this.entity_id }}"
      - alias: "Custom Action Manual"
        conditions:
          - condition: trigger
            id: custom
        sequence: !input "custom_action_manual"
      - alias: "GenAI Summary"
        conditions:
          - condition: trigger
            id: "genai-event"
          - condition: template
            value_template: "{{ filters_satisfied }}"
          - alias: "Zone Filter"
            condition: template
            value_template: "{{ not zone_only or after_zones | select('in', zones) | list | length > 0 }}"
        sequence:
          - variables:
              event: "{{ trigger.payload_json }}"
              detections: "{{ event['after']['data']['detections'] }}"
              review_id: "{{ event['after']['id'] }}"
              id: "{{ detections[0] if detections|length > 0 else 'none' }}"
              metadata: "{{ event['after']['data']['metadata'] | default({}) }}"
              genai_title: "{{ metadata.title | default('') }}"
              genai_shortSummary: "{{ metadata.shortSummary | default('') }}"
              genai_threat_level: "{{ metadata.potential_threat_level | int(0) }}"
              title: >-
                {% if genai_threat_level == 2 %}
                  Security Concern: {{ genai_title }}
                {% elif genai_threat_level == 1 %}
                  Needs Review: {{ genai_title }}
                {% else %}
                  {{ genai_title }}
                {% endif %}
              message: "{{ genai_shortSummary }}"
              subtitle: !input subtitle
              group: !input group
              tag: "{{ review_id }}"
              channel: !input channel
              sticky: false
              sound: "none"
              critical: false
              tap_action: !input tap_action
              button_1: !input button_1
              button_2: !input button_2
              button_3: !input button_3
              url_1: !input url_1
              url_2: !input url_2
              url_3: !input url_3
              icon_1: !input icon_1
              icon_2: !input icon_2
              icon_3: !input icon_3
              ios_live_view: !input ios_live_view
              android_auto: !input android_auto
              tv: !input tv
              tv_position: !input tv_position
              tv_size: !input tv_size
              tv_duration: !input tv_duration
              tv_transparency: !input tv_transparency
              tv_interrupt: !input tv_interrupt
              attachment: !input attachment
              video: !input video
          - alias: "Send GenAI Notification"
            sequence:
              - choose:
                  - conditions: "{{ telegram }}"
                    sequence:
                      - action: telegram_bot.send_photo
                        data:
                          chat_id: "{{telegram_chat_id}}"
                          caption: "{{message}}"
                          url: "{{attachment|replace( base_url, telegram_base_url )}}"
                  - conditions: "{{ not notify_group_target }}"
                    sequence:
                      - device_id: !input notify_device
                        domain: mobile_app
                        type: notify
                        title: "{{title}}"
                        message: "{{message}}"
                        data:
                          tag: "{{ tag }}"
                          group: "{{ group }}"
                          subject: "{{subtitle}}"
                          image: "{{attachment}}"
                          video: "{{video}}"
                          clickAction: "{{tap_action}}"
                          ttl: 0
                          priority: high
                          sticky: "{{sticky}}"
                          channel: "{{'alarm_stream' if critical else channel}}"
                          car_ui: "{{android_auto}}"
                          subtitle: "{{subtitle}}"
                          url: "{{tap_action}}"
                          attachment:
                            url: "{{video if video else attachment }}"
                            content-type: "{{ 'application/vnd.apple.mpegurl' if 'm3u8' in video else 'mp4' if 'mp4' in video else 'jpeg' if 'jpg' in attachment else 'gif' }}"
                          push:
                            sound:
                              name: "{{sound}}"
                              volume: "{{ iif(sound == 'none', 0, volume) }}"
                              critical: "{{ iif(critical, 1, 0) }}"
                          entity_id: "{{ios_live_view}}"
                          actions:
                            - action: URI
                              title: "{{button_1}}"
                              uri: "{{url_1}}"
                              icon: "{{icon_1}}"
                            - action: URI
                              title: "{{button_2}}"
                              uri: "{{url_2}}"
                              icon: "{{icon_2}}"
                            - action: "{{ 'URI' if '/' in url_3 else url_3 }}"
                              title: "{{button_3}}"
                              uri: "{{url_3}}"
                              icon: "{{icon_3}}"
                              destructive: true
      - alias: "GenAI Description Update"
        conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: "frigate-event"
                  - condition: template
                    value_template: "{{ trigger.payload_json['type'] == 'genai' }}"
              - condition: and
                conditions:
                  - condition: trigger
                    id: "frigate-ai-update"
                  - condition: template
                    value_template: "{{ trigger.payload_json['type'] == 'description' }}"
        sequence:
          - variables:
              event: "{{ trigger.payload_json }}"
              is_description: "{{ trigger.id == 'frigate-ai-update' or event['type'] == 'description' }}"
              review_id: "{{ event['id'] if is_description else event['after']['id'] }}"
              genai_text: >
                {% if is_description %}
                  {{ event['description'] }}
                {% else %}
                  {{ event['after']['data']['metadata']['shortSummary'] | default('') }}
                {% endif %}
              title: "AI Analysis: {{ camera_name }}"
              message: "{{ genai_text }}"
              id: "{{ review_id }}"
              tag: "{{ review_id }}"
          - alias: "Send GenAI Notification Update"
            sequence:
              - choose:
                  - conditions: "{{ not notify_group_target }}"
                    sequence:
                      - device_id: !input notify_device
                        domain: mobile_app
                        type: notify
                        title: "{{title}}"
                        message: "{{message}}"
                        data:
                          tag: "{{ tag }}"
                          clickAction: "{{base_url}}/api/frigate/notifications/{{id}}/{{camera}}/clip.mp4"
      - alias: "Frigate Event"
        conditions:
          - condition: trigger
            id: "frigate-event"
        sequence:
          - variables:
              event: "{{ trigger.payload_json }}"
              detections: "{{ event['after']['data']['detections'] }}"
              review_id: "{{event['after']['id']}}"
              id: "{{ detections[0] if detections|length > 0 else 'none' }}"
              objects: "{{ event['after']['data']['objects'] }}"
              sub_labels: "{{ event['after']['data']['sub_labels'] if 'sub_labels' in event['after']['data'] else [] }}"
              label: >-
                {% if update_sub_label %}
                  {% set data = namespace(labels=[]) %} 
                  {% if labels|length %}
                    {% for obj in objects|select('in', labels) %}
                      {% if "-verified" not in obj %}
                        {% set data.labels = data.labels + [obj] %}
                      {% endif %}
                    {% endfor %} {% set data.labels = data.labels + sub_labels %} 
                    {{ data.labels | unique | list | sort | join(", ") | title }}
                  {% else %}
                    {% for obj in objects %}
                      {% if "-verified" not in obj %}
                        {% set data.labels = data.labels + [obj] %}
                      {% endif %}
                    {% endfor %} {% set data.labels = data.labels + sub_labels %} 
                    {{ data.labels | unique | list | sort | join(", ") | title }}
                  {% endif %}
                {% else %}
                  {{ objects | list | join(", ") | title }}
                {% endif %}
              any_zones_entered: "{{ zones | length == 0 or ((zones | select('in', after_zones) | list | length) > 0) }}"
              zone_single_satisfied: "{{ any_zones_entered if zone_only else true}}"
              all_zones_entered: "{{ zones | length == 0 or ((zones | reject('in', after_zones) | list | length) == 0) }}"
              zone_multi_satisfied: "{{ all_zones_entered if zone_only and zone_multi else true}}"
              ordered_zones_match: >
                {% set ns = namespace(intersection=[]) %}
                {% for item in after_zones %}
                    {% if item in zones %}
                        {% set ns.intersection = ns.intersection + [item] %}
                    {% endif %}
                {% endfor %}
                {{ ns.intersection == zones }}
              zone_order_satisfied: "{{ (zone_only and zone_multi and ordered_zones_match) if zone_order_enforced else true }}"
              zones_satisfied: "{{zone_single_satisfied and zone_multi_satisfied and zone_order_satisfied}}"
              title: !input title
              message: !input message
              subtitle: !input subtitle
              tap_action: !input tap_action
              button_1: !input button_1
              button_2: !input button_2
              button_3: !input button_3
              url_1: !input url_1
              url_2: !input url_2
              url_3: !input url_3
              icon_1: !input icon_1
              icon_2: !input icon_2
              icon_3: !input icon_3
              critical_input: !input critical
              critical: "{{ true if critical_input == 'true' else true if critical_input == True else false }}"
              tts: !input tts
              tts_helper: !input tts_helper
              custom_filter: !input custom_filter
              icon: !input icon
              group: !input group
              channel: !input channel
              attachment: !input attachment
              video: !input video
              custom_action_auto: !input custom_action_auto
          - alias: "Send Notification"
            sequence:
              - choose:
                  - conditions: "{{ telegram }}"
                    sequence:
                      - action: telegram_bot.send_photo
                        data:
                          chat_id: "{{telegram_chat_id}}"
                          caption: "{{message}}"
                          url: "{{attachment|replace( base_url, telegram_base_url )}}"
                  - conditions: "{{ not notify_group_target }}"
                    sequence:
                      - device_id: !input notify_device
                        domain: mobile_app
                        type: notify
                        title: "{{title}}"
                        message: "{{message}}"
                        data:
                          tag: "{{ id }}"
                          group: "{{ group }}"
                          color: "{{color}}"
                          subject: "{{subtitle}}"
                          image: "{{attachment}}"
                          video: "{{video}}"
                          clickAction: "{{tap_action}}"
                          ttl: 0
                          priority: high
                          notification_icon: "{{icon}}"
                          sticky: "{{sticky}}"
                          channel: "{{'alarm_stream' if critical else channel}}"
                          car_ui: "{{android_auto}}"
                          subtitle: "{{subtitle}}"
                          url: "{{tap_action}}"
                          attachment:
                            url: "{{video if video else attachment }}"
                            content-type: "{{ 'application/vnd.apple.mpegurl' if 'm3u8' in video else 'mp4' if 'mp4' in video else 'jpeg' if 'jpg' in attachment else 'gif' }}"
                          push:
                            sound:
                              name: "{{sound}}"
                              volume: "{{ iif(sound == 'none', 0, volume) }}"
                              critical: "{{ iif(critical, 1, 0) }}"
                          entity_id: "{{ios_live_view}}"
                          actions:
                            - action: URI
                              title: "{{button_1}}"
                              uri: "{{url_1}}"
                              icon: "{{icon_1}}"
                            - action: URI
                              title: "{{button_2}}"
                              uri: "{{url_2}}"
                              icon: "{{icon_2}}"
                            - action: "{{ 'URI' if '/' in url_3 else url_3 }}"
                              title: "{{button_3}}"
                              uri: "{{url_3}}"
                              icon: "{{icon_3}}"
                              destructive: true
          - repeat:
              sequence:
                - wait_for_trigger:
                    - trigger: mqtt
                      topic: "{{mqtt_topic}}"
                      payload: "{{ review_id }}"
                      value_template: "{{ value_json['after']['id'] }}"
                  timeout:
                    minutes: "{{timeout}}"
                  continue_on_timeout: false
                - variables:
                    attachment_2: !input attachment_2
                    attachment: "{{iif(attachment_2, attachment_2, attachment)}}"
                    event: "{{ wait.trigger.payload_json }}"
                    type: "{{event['type']}}"
                    initial_severity: "{{severity}}"
                    old_objects: "{{objects}}"
                    last_zones: "{{after_zones}}"
                    severity: "{{event['after']['severity']}}"
                    severity_updated: "{{initial_severity != severity}}"
                    severity_satisfied: "{{((input_severity | select('equalto', severity) | list | length) > 0) }}"
                    objects: "{{ event['after']['data']['objects'] }}"
                    objects_satisfied: "{{ not labels|length or labels|select('in', objects)|list|length > 0 or objects|map('regex_replace', '-verified$', '')|select('in', labels)|list|length > 0 }}"
                    home: "{{presence_entity |reject('in', '') |select('is_state', 'home') |list |length != 0 }}"
                    presence_changed: "{{ presence_entity |reject('in', '') |expand |map(attribute='last_changed') |list |select('gt', as_datetime(event['before']['start_time'])) |list |length != 0 }}"
                    before_zones: "{{ event['before']['data']['zones'] | default([]) }}"
                    after_zones: "{{ event['after']['data']['zones'] | default([]) }}"
                    any_zones_entered: "{{ zones | length == 0 or ((zones | select('in', after_zones) | list | length) > 0) }}"
                    zone_single_satisfied: "{{ any_zones_entered if zone_only else true}}"
                    all_zones_entered: "{{ zones | length == 0 or ((zones | reject('in', after_zones) | list | length) == 0) }}"
                    zone_multi_satisfied: "{{ all_zones_entered if zone_only and zone_multi else true}}"
                    ordered_zones_match: >
                      {% set ns = namespace(intersection=[]) %}
                      {% for item in after_zones %}
                          {% if item in zones %}
                              {% set ns.intersection = ns.intersection + [item] %}
                          {% endif %}
                      {% endfor %}
                      {{ ns.intersection == zones }}
                    zone_order_satisfied: "{{ (zone_only and zone_multi and ordered_zones_match) if zone_order_enforced else true }}"
                    zones_satisfied: "{{zone_single_satisfied and zone_multi_satisfied and zone_order_satisfied}}"
                    new_entered_zones: "{{ zones | select('in', after_zones) | list }}"
                    last_entered_zones: "{{ zones | select('in', last_zones) | list }}"
                    entered_new_zones: "{{ not zone_only and after_zones | length > last_zones | length }}"
                    entered_new_filter_zones: "{{ zone_only and zones | length > 0 and (new_entered_zones | length > last_entered_zones | length) }}"
                    state_satisfied: "{{ not state_only or states(input_entity)|lower in states_filter }}"
                    before_sub_labels: "{{ sub_labels }}"
                    sub_labels: "{{ event['after']['data']['sub_labels'] | default([]) }}"
                    label: >-
                      {% if update_sub_label %}
                        {% set data = namespace(labels=[]) %} 
                        {% if labels|length %}
                          {% for obj in objects|select('in', labels) %}
                            {% if "-verified" not in obj %}
                              {% set data.labels = data.labels + [obj] %}
                            {% endif %}
                          {% endfor %} {% set data.labels = data.labels + sub_labels %} 
                          {{ data.labels | unique | list | sort | join(", ") | title }}
                        {% else %}
                          {% for obj in objects %}
                            {% if "-verified" not in obj %}
                              {% set data.labels = data.labels + [obj] %}
                            {% endif %}
                          {% endfor %} {% set data.labels = data.labels + sub_labels %} 
                          {{ data.labels | unique | list | sort | join(", ") | title }}
                        {% endif %}
                      {% else %}
                        {{objects | list | join(', ') | title}}
                      {% endif %}
                    title: !input title
                    message: !input message
                    subtitle: !input subtitle
                    critical_input: !input critical
                    critical: "{{ true if critical_input == 'true' else true if critical_input == True else false }}"
                    tts: !input tts
                    sub_label_updated: "{{ update_sub_label and sub_labels != before_sub_labels }}"
                    zone_updated: "{{ (entered_new_filter_zones and zones_satisfied) or entered_new_zones }}"
                    object_updated: "{{ old_objects | select('in', labels) | list | length  != objects | select('in', labels) | list | length }}"
                    silent_update: "{{ alert_once or (not presence_changed and not zone_updated and not object_updated and not sub_label_updated) }}"
                    custom_action_auto_multi: !input custom_action_auto_multi
                - choose:
                    - conditions:
                        - and:
                            - condition: template
                              value_template: "{{severity_satisfied}}"
                            - condition: template
                              value_template: "{{ objects_satisfied }}"
                            - condition: template
                              value_template: "{{zones_satisfied}}"
                            - condition: template
                              value_template: "{{state_satisfied}}"
                            - condition: template
                              value_template: "{{custom_filter}}"
                            - condition: template
                              value_template: "{{not home}}"
                            - or:
                                - condition: template
                                  value_template: "{{presence_changed}}"
                                - condition: template
                                  value_template: "{{zone_updated}}"
                                - condition: template
                                  value_template: "{{sub_label_updated}}"
                                - condition: template
                                  value_template: "{{object_updated}}"
                                - condition: template
                                  value_template: "{{severity_updated}}"
                                - and:
                                    - condition: template
                                      value_template: "{{final_update}}"
                                    - condition: template
                                      value_template: "{{event['type'] == 'end'}}"
                      sequence:
                        - alias: "Update Notification"
                          sequence:
                            - choose:
                                - conditions: "{{ not notify_group_target }}"
                                  sequence:
                                    - device_id: !input notify_device
                                      domain: mobile_app
                                      type: notify
                                      title: "{{title}}"
                                      message: "{{message}}"
                                      data:
                                        tag: "{{ id }}"
                                        group: "{{ group }}"
                                        color: "{{color}}"
                                        subject: "{{subtitle}}"
                                        image: "{{attachment}}"
                                        video: "{{video}}"
                                        clickAction: "{{tap_action}}"
                                        ttl: 0
                                        priority: high
                                        alert_once: "{{ alert_once }}"
                                        notification_icon: "{{icon}}"
                                        sticky: "{{sticky}}"
                                        channel: "{{'alarm_stream' if critical else channel}}"
                                        car_ui: "{{android_auto}}"
                                        subtitle: "{{subtitle}}"
                                        url: "{{tap_action}}"
                                        attachment:
                                          url: "{{video if video else attachment }}"
                                          content-type: "{{ 'application/vnd.apple.mpegurl' if 'm3u8' in video else 'mp4' if 'mp4' in video else 'jpeg' if 'jpg' in attachment else 'gif' }}"
                                        push:
                                          sound:
                                            name: "{{ iif(silent_update, 'none', sound) }}"
                                            volume: "{{ iif((silent_update or sound == 'none'), 0, volume) }}"
                                            critical: "{{ iif(critical, 1, 0) }}"
                                        entity_id: "{{ios_live_view}}"
                                        actions:
                                          - action: URI
                                            title: "{{button_1}}"
                                            uri: "{{url_1}}"
                                            icon: "{{icon_1}}"
                                          - action: URI
                                            title: "{{button_2}}"
                                            uri: "{{url_2}}"
                                            icon: "{{icon_2}}"
                                          - action: "{{ 'URI' if '/' in url_3 else url_3 }}"
                                            title: "{{button_3}}"
                                            uri: "{{url_3}}"
                                            icon: "{{icon_3}}"
                                            destructive: true
              until: "{{ not wait.trigger or wait.trigger.payload_json['type'] == 'end' }}"
